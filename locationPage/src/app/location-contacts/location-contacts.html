<div class="section">

  <h4 class="sub-title">Location Contact</h4>

  <div class="contact-scroll">

    <table class="table">

      <thead>
        <tr>
          <td class="label">Position</td>
          <td class="label">Email</td>
          <td class="label">Name</td>
          <td class="label">SSO ID</td>
        </tr>
      </thead>

      
      <tbody>
        <tr *ngFor="let item of data">
          <td>{{ item.position }}</td>

          <td>
            <a href="mailto:{{item.email}}" class="email-link">
              {{ item.email }}
            </a>
          </td>

          <td>{{ item.name }}</td>
          <td>{{ item.ssoId }}</td>
        </tr>
      </tbody>

    </table>

  </div>

</div>
